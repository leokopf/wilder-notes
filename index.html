<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wilder Notes — Birds Near You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

  <main>
    <h1>Wilder Notes</h1>
    <p>Recent bird sightings near you</p>

    <input
      id="location"
      placeholder="Town, county or postcode"
      autocomplete="off"
    />
    <button id="searchBtn">Search</button>

    <p id="meta"></p>
    <ul id="results"></ul>
  </main>

  <script src="app.js"></script>
  <script>
    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("location").addEventListener("keydown", (e) => {
      if (e.key === "Enter") search();
    });
  </script>
</body>
</html>

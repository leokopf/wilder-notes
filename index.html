<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wilder Notes — Birds Near You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

  <main>
    <h1>Wilder Notes</h1>
    <p>Recent bird sightings near you</p>

    <label for="location">Location</label><br />
    <input
      id="location"
      placeholder="Town, county, postcode, or coordinates"
      autocomplete="off"
      maxlength="50"
    />
    <button id="searchBtn" type="button">Search</button>

    <div style="margin-top: 6px; font-size: 12px; opacity: 0.85;">
      <span id="charCount">0/50</span>
      <span id="charMsg" style="margin-left: 10px;"></span>
    </div>

    <p id="meta"></p>

    <h2>Most seen</h2>
    <ul id="results"></ul>

    <h2>Unusual</h2>
    <p id="rareMeta"></p>
    <ul id="rareResults"></ul>

    <footer style="margin-top: 24px; font-size: 12px; opacity: 0.85;">
      <p>
        Bird observations and notable sightings: © eBird / Cornell Lab of Ornithology.
        Geocoding: © OpenStreetMap contributors (Nominatim).
      </p>
      <p>
        <a href="https://ebird.org" target="_blank" rel="noopener noreferrer">eBird</a>
        · <a href="https://www.birds.cornell.edu/home/ebird-api-terms-of-use/" target="_blank" rel="noopener noreferrer">eBird API Terms</a>
        · <a href="https://operations.osmfoundation.org/policies/nominatim/" target="_blank" rel="noopener noreferrer">Nominatim Usage Policy</a>
      </p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
